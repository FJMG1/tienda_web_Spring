<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout.html}">

<div th:fragment="mainContent">

    <h2 class="mb-4">Editar mis datos</h2>

    <form th:action="@{/profile/edit}" th:object="${editDTO}" method="post" class="card p-4 shadow-sm">

        <div class="mb-3">
            <label class="form-label">Nombre de usuario</label>
            <input type="text" th:field="*{name}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Correo electrónico</label>
            <input type="email" th:field="*{email}" class="form-control" required>
        </div>

        <hr>

        <h5>Cambiar contraseña (opcional)</h5>

        <div class="mb-3">
            <label class="form-label">Contraseña actual</label>
            <input type="password" th:field="*{currentPassword}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Nueva contraseña</label>
            <input type="password" th:field="*{newPassword}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Repetir nueva contraseña</label>
            <input type="password" th:field="*{confirmNewPassword}" class="form-control">
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <button class="btn btn-primary w-100 mt-3">Guardar cambios</button>
    </form>

</div>

</html>
