<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
<link th:href="@{/webjars/bootstrap/5.3.1/css/bootstrap.min.css}" rel="stylesheet" />
    <style>
        html, body { height: 100%; }
        body { display: flex; flex-direction: column; }
        main { flex: 1; }
    </style>
</head>

<body>

<!-- NAVBAR -->
<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid">

            <!-- LOGO -->
            <a class="navbar-brand fw-bold" th:href="@{/}">Shop</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav" aria-controls="navbarNav"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <!-- LEFT MENU -->
                <ul class="navbar-nav me-auto">

                    <!-- Catálogo -->
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">Catálogo</a>
                    </li>

                    <!-- Carrito (solo comprador autenticado) -->
					<li class="nav-item" sec:authorize="hasRole('COMPRADOR')">
					    <a class="nav-link position-relative" th:href="@{/cart}">
					        Carrito

					        <!-- Badge con cantidad -->
					        <span th:if="${cartCount > 0}"
					              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
					              th:text="${cartCount}">
					        </span>
					    </a>
					</li>

                    <!-- ADMIN: Gestión de productos -->
					<li class="nav-item dropdown" sec:authorize="hasRole('ADMIN')">
					    <a class="nav-link dropdown-toggle" href="#" role="button"
					       data-bs-toggle="dropdown">Administración</a>

					    <ul class="dropdown-menu">
					        <li><a class="dropdown-item" th:href="@{/admin/products}">Productos</a></li>
					        <li><a class="dropdown-item" th:href="@{/admin/sales}">Ventas</a></li>
					        <li><a class="dropdown-item" th:href="@{/admin/users}">Usuarios</a></li>
					    </ul>
					</li>

                </ul>

                <!-- RIGHT MENU -->
                <ul class="navbar-nav ms-auto">

                    <!-- Si NO está autenticado -->
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" th:href="@{/login}">Iniciar sesión</a>
                    </li>

                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" th:href="@{/register}">Registrarse</a>
                    </li>

                    <!-- Si está autenticado -->
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle" href="#" role="button"
                           data-bs-toggle="dropdown">
                            <span sec:authentication="name"></span>
                        </a>

                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" th:href="@{/profile}">Mi perfil</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
								<form th:action="@{/logout}" method="post">
							    <button type="submit" class="dropdown-item text-danger">Cerrar sesión</button>
								</form>
							</li>
                        </ul>
                    </li>

                </ul>

            </div>
        </div>
    </nav>
</header>

<!-- MAIN CONTENT -->
<main>
    <div class="container py-4">
        <div th:insert="~{::mainContent}"></div>
    </div>
</main>

<!-- FOOTER -->
<footer class="bg-light text-center py-3 mt-auto">
    <script th:src="@{/webjars/bootstrap/5.3.1/js/bootstrap.bundle.min.js}" defer></script>
    <script th:src="@{/js/app.js}" defer></script>
    <p class="text-muted mb-0">&copy; 2026 Reality Shop</p>
</footer>

</body>
</html>
