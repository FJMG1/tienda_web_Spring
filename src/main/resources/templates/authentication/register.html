<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout.html}">

<div th:fragment="mainContent">

    <section class="py-5">
        <div class="container" style="max-width: 550px;">

            <h2 class="fw-bold text-center text-primary mb-4">Crear cuenta</h2>

            <div th:if="${error}" class="alert alert-danger text-center">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/auth/register}"
                  th:object="${registerDTO}"
                  method="post"
                  class="card shadow-sm p-4">

                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text"
                           th:field="*{username}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Correo electrónico</label>
                    <input type="email"
                           th:field="*{email}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password"
                           th:field="*{password}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Repetir contraseña</label>
                    <input type="password"
                           th:field="*{confirmPassword}"
                           class="form-control"
                           required>
                </div>

                <button class="btn btn-success w-100 mt-3">Registrarse</button>

            </form>

        </div>
    </section>

</div>

</html>
