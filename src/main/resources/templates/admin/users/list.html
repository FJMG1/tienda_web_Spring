<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout.html}">

<div th:fragment="mainContent">

    <h2 class="fw-bold text-primary mb-4">Gestión de usuarios</h2>

    <table class="table table-striped table-hover shadow-sm">
        <thead class="table-primary">
            <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Email</th>
                <th>Rol</th>
                <th class="text-end">Acciones</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="u : ${usersPage.content}">
                <td th:text="${u.id}"></td>
                <td th:text="${u.name}"></td>
                <td th:text="${u.email}"></td>

                <!-- SELECT PARA CAMBIAR ROL -->
                <td>
                    <form th:action="@{'/admin/users/role/' + ${u.id}}" method="post">
                        <select name="rol"
                                class="form-select form-select-sm"
                                style="width: 150px; display: inline-block;"
                                onchange="this.form.submit()">

								<option value="ADMIN" th:selected="${u.rol.name() == 'ADMIN'}">ADMIN</option>
								<option value="COMPRADOR" th:selected="${u.rol.name() == 'COMPRADOR'}">COMPRADOR</option>

                        </select>
                    </form>
                </td>

                <td class="text-end">

                    <!-- Reset password -->
                    <a th:href="@{'/admin/users/reset/' + ${u.id}}"
                       class="btn btn-warning btn-sm">
                        Restablecer contraseña
                    </a>

                </td>
            </tr>
        </tbody>
    </table>

    <!-- Mensajes -->
    <div th:if="${param.resetSuccess}">
        <div class="alert alert-success mt-3">Contraseña actualizada correctamente.</div>
    </div>

    <div th:if="${param.roleUpdated}">
        <div class="alert alert-success mt-3">Rol actualizado correctamente.</div>
    </div>

    <!-- PAGINACIÓN -->
    <nav th:if="${totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">

            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{'/admin/users?page=' + ${currentPage - 1}}">Anterior</a>
            </li>

            <li class="page-item" th:if="${start > 0}">
                <a class="page-link" th:href="@{'/admin/users?page=0'}">1</a>
            </li>

            <li class="page-item disabled" th:if="${start > 1}">
                <span class="page-link">...</span>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(start, end)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:text="${i + 1}"
                   th:href="@{'/admin/users?page=' + ${i}}"></a>
            </li>

            <li class="page-item disabled" th:if="${end < totalPages - 2}">
                <span class="page-link">...</span>
            </li>

            <li class="page-item" th:if="${end < totalPages - 1}">
                <a class="page-link"
                   th:text="${totalPages}"
                   th:href="@{'/admin/users?page=' + ${totalPages - 1}}"></a>
            </li>

            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{'/admin/users?page=' + ${currentPage + 1}}">Siguiente</a>
            </li>

        </ul>
    </nav>

</div>

</html>
