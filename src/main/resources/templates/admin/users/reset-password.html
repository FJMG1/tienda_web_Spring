<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout.html}">

<div th:fragment="mainContent">

    <h2 class="fw-bold text-primary mb-4">Restablecer contraseña</h2>

    <div class="card shadow-sm p-4" style="max-width: 450px;">

        <p><strong>Usuario:</strong> <span th:text="${user.name}"></span></p>
        <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>

        <form th:action="@{'/admin/users/reset/' + ${user.id}}" method="post">

            <div class="mb-3">
                <label class="form-label">Nueva contraseña</label>
                <input type="password" name="newPassword" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Repetir contraseña</label>
                <input type="password" name="confirmPassword" class="form-control" required>
            </div>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <button class="btn btn-primary w-100">Guardar nueva contraseña</button>
        </form>

    </div>

    <a href="/admin/users" class="btn btn-secondary mt-3">Volver</a>

</div>

</html>
