<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout.html}">

<div th:fragment="mainContent">

    <h2 class="fw-bold text-primary mb-4">Todas las compras</h2>

    <table class="table table-striped table-hover shadow-sm">
        <thead class="table-primary">
            <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Fecha</th>
                <th>Total</th>
                <th>Estado</th>
                <th class="text-end">Acciones</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="s : ${salesPage.content}">
                <td th:text="${s.id}"></td>
                <td th:text="${s.user.name}"></td>
                <td th:text="${s.dateSale}"></td>
                <td th:text="${s.total} + ' €'"></td>
                <td th:text="${s.status}"></td>
                <td class="text-end">
                    <a th:href="@{'/admin/sales/' + ${s.id}}" class="btn btn-primary btn-sm">
                        Ver detalle
                    </a>
                </td>
            </tr>
        </tbody>
    </table>

    <!-- PAGINACIÓN -->
    <nav th:if="${totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">

            <!-- Anterior -->
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{'/admin/sales?page=' + ${currentPage - 1}}">Anterior</a>
            </li>

            <!-- Primera página -->
            <li class="page-item" th:if="${start > 0}">
                <a class="page-link" th:href="@{'/admin/sales?page=0'}">1</a>
            </li>

            <!-- ... -->
            <li class="page-item disabled" th:if="${start > 1}">
                <span class="page-link">...</span>
            </li>

            <!-- Páginas visibles -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(start, end)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:text="${i + 1}"
                   th:href="@{'/admin/sales?page=' + ${i}}"></a>
            </li>

            <!-- ... -->
            <li class="page-item disabled" th:if="${end < totalPages - 2}">
                <span class="page-link">...</span>
            </li>

            <!-- Última página -->
            <li class="page-item" th:if="${end < totalPages - 1}">
                <a class="page-link"
                   th:text="${totalPages}"
                   th:href="@{'/admin/sales?page=' + ${totalPages - 1}}"></a>
            </li>

            <!-- Siguiente -->
            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{'/admin/sales?page=' + ${currentPage + 1}}">Siguiente</a>
            </li>

        </ul>
    </nav>

</div>

</html>
