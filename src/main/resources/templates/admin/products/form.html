<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout.html}">

<div th:fragment="mainContent">

    <h2 th:switch="${mode}" class="fw-bold text-primary mb-4">
        <span th:case="'create'">Crear producto</span>
        <span th:case="'edit'">Editar producto</span>
        <span th:case="'view'">Ver producto</span>
        <span th:case="'delete'">Eliminar producto</span>
    </h2>

	<form th:object="${product}"
	      method="post"
	      th:switch="${mode}"
	      class="card shadow-sm p-4"
	      th:action="${mode == 'create'} ? @{/admin/products/save} :
	                 (${mode == 'edit'} ? @{/admin/products/update/{id}(id=${product.id})} :
	                 (${mode == 'delete'} ? @{/admin/products/delete/{id}(id=${product.id})} : ''))">

        <div class="mb-3">
            <label>Nombre</label>
            <input type="text" th:field="*{name}" class="form-control"
                   th:disabled="${mode == 'view' or mode == 'delete'}">
        </div>

        <div class="mb-3">
            <label>Descripción</label>
            <textarea th:field="*{description}" class="form-control"
                      th:disabled="${mode == 'view' or mode == 'delete'}"></textarea>
        </div>

        <div class="mb-3">
            <label>Precio</label>
            <input type="number" step="0.01" th:field="*{price}" class="form-control"
                   th:disabled="${mode == 'view' or mode == 'delete'}">
        </div>

        <div class="mb-3">
            <label>Stock</label>
            <input type="number" th:field="*{stock}" class="form-control"
                   th:disabled="${mode == 'view' or mode == 'delete'}">
        </div>

        <div class="mb-3">
            <label>Imagen (URL)</label>
            <input type="text" th:field="*{image}" class="form-control"
                   th:disabled="${mode == 'view' or mode == 'delete'}">
        </div>

        <!-- Vista previa de la imagen -->
        <div class="mb-3" th:if="${product.image}">
            <label>Vista previa</label>
            <div>
                <img th:src="${product.image}" class="img-fluid rounded shadow-sm" style="max-height: 200px;">
            </div>
        </div>

        <div th:if="${mode == 'create'}">
            <button class="btn btn-success">Crear producto</button>
        </div>

        <div th:if="${mode == 'edit'}">
            <button class="btn btn-primary">Guardar cambios</button>
        </div>

        <div th:if="${mode == 'delete'}">
            <p class="text-danger fw-bold">¿Seguro que deseas eliminar este producto?</p>
            <button class="btn btn-danger">Eliminar definitivamente</button>
        </div>

    </form>

    <a href="/admin/products" class="btn btn-secondary mt-3">Volver</a>

</div>

</html>
