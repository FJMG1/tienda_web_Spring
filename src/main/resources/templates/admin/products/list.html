<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout.html}">

<div th:fragment="mainContent">

    <h2 class="fw-bold text-primary mb-4">Gestión de productos</h2>

    <a th:href="@{/admin/products/new}" class="btn btn-success mb-3">Nuevo producto</a>

    <table class="table table-striped table-hover shadow-sm">
        <thead class="table-primary">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th class="text-end">Acciones</th>
            </tr>
        </thead>

		<tbody>
		    <tr th:each="p : ${productPage.content}">
		        <td th:text="${p.id}"></td>
		        <td th:text="${p.name}"></td>
		        <td th:text="${#numbers.formatDecimal(p.price, 1, 2)} + ' €'"></td>
		        <td th:text="${p.stock}"></td>
		        <td class="text-end">
		            <a th:href="@{'/admin/products/view/' + ${p.id}}" class="btn btn-secondary btn-sm">Ver</a>
		            <a th:href="@{'/admin/products/edit/' + ${p.id}}" class="btn btn-primary btn-sm">Editar</a>
		            <a th:href="@{'/admin/products/delete/' + ${p.id}}" class="btn btn-danger btn-sm">Eliminar</a>
		        </td>
		    </tr>
		</tbody>
    </table>
	<!-- PAGINACIÓN -->
	<nav th:if="${totalPages > 1}" class="mt-4">
	    <ul class="pagination justify-content-center">

	        <!-- Botón Anterior -->
	        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
	            <a class="page-link"
	               th:href="@{'/admin/products?page=' + ${currentPage - 1}}">
	                Anterior
	            </a>
	        </li>

	        <!-- Mostrar "1" si estamos lejos del inicio -->
	        <li class="page-item" th:if="${start > 0}">
	            <a class="page-link" th:href="@{'/admin/products?page=0'}">1</a>
	        </li>

	        <!-- Mostrar "..." si hay hueco -->
	        <li class="page-item disabled" th:if="${start > 1}">
	            <span class="page-link">...</span>
	        </li>

	        <!-- Páginas visibles -->
	        <li class="page-item"
	            th:each="i : ${#numbers.sequence(start, end)}"
	            th:classappend="${i == currentPage} ? 'active'">
	            <a class="page-link"
	               th:text="${i + 1}"
	               th:href="@{'/admin/products?page=' + ${i}}"></a>
	        </li>

	        <!-- Mostrar "..." si hay hueco al final -->
	        <li class="page-item disabled" th:if="${end < totalPages - 2}">
	            <span class="page-link">...</span>
	        </li>

	        <!-- Mostrar última página -->
	        <li class="page-item" th:if="${end < totalPages - 1}">
	            <a class="page-link"
	               th:text="${totalPages}"
	               th:href="@{'/admin/products?page=' + ${totalPages - 1}}"></a>
	        </li>

	        <!-- Botón Siguiente -->
	        <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
	            <a class="page-link"
	               th:href="@{'/admin/products?page=' + ${currentPage + 1}}">
	                Siguiente
	            </a>
	        </li>

	    </ul>
	</nav>
</div>

</html>
