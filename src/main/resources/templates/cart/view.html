<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout.html}">

<div th:fragment="mainContent">

    <section class="py-4">
        <div class="container">

            <h2 class="fw-bold text-primary mb-4">Tu carrito de compra</h2>

            <!-- Si el carrito está vacío -->
            <div th:if="${#maps.isEmpty(items)}" class="alert alert-info text-center">
                Tu carrito está vacío.
                <a th:href="@{/}" class="alert-link">Ver catálogo</a>
            </div>

            <!-- Si el carrito tiene productos -->
            <div th:if="${!#maps.isEmpty(items)}">

                <div class="table-responsive shadow-sm">
                    <table class="table table-hover align-middle">
                        <thead class="table-primary">
                            <tr>
                                <th>Producto</th>
                                <th>Precio</th>
                                <th>Cantidad</th>
                                <th>Subtotal</th>
                                <th></th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:each="item : ${items}">

                                <!-- Producto -->
                                <td>
                                    <div class="d-flex align-items-center">
                                        <img th:src="@{${item.key.image}}"
                                             class="rounded me-3"
                                             style="width: 60px; height: 60px; object-fit: cover;">
                                        <span th:text="${item.key.name}" class="fw-semibold"></span>
                                    </div>
                                </td>

                                <!-- Precio -->
                                <td>
                                    <span th:text="${item.key.price}"></span> €
                                </td>

                                <!-- Cantidad -->
                                <td>
                                    <form th:action="@{/cart/update}" method="post" class="d-flex align-items-center">
                                        <input type="hidden" name="productId" th:value="${item.key.id}">
                                        <input type="number" name="quantity"
                                               th:value="${item.value}"
                                               min="1"
                                               th:max="${item.key.stock}"
                                               class="form-control form-control-sm"
                                               style="width: 70px;">
                                        <button class="btn btn-sm btn-outline-primary ms-2">Actualizar</button>
                                    </form>
                                </td>

                                <!-- Subtotal -->
                                <td>
                                    <span th:text="${item.key.price * item.value}"></span> €
                                </td>

                                <!-- Eliminar -->
                                <td class="text-end">
                                    <a th:href="@{/cart/remove/{id}(id=${item.key.id})}"
                                       class="btn btn-sm btn-danger">
                                        Eliminar
                                    </a>
                                </td>

                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Resumen del total -->
                <div class="d-flex justify-content-end mt-4">
                    <div class="card shadow-sm" style="width: 300px;">
                        <div class="card-body">
                            <h5 class="card-title fw-bold">Resumen</h5>

                            <p class="d-flex justify-content-between">
                                <span>Total:</span>
                                <span class="fw-bold text-success" th:text="${#numbers.formatDecimal(total, 1, 2)} + ' €'"></span>
                            </p>

                            <a th:href="@{/checkout}" class="btn btn-primary w-100 mt-3">
                                Finalizar compra
                            </a>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </section>

</div>

</html>
